<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VegaMind — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Instrument+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --void:#04040d;
  --deep:#07071a;
  --mid:#0c0c28;
  --violet:#7c3aed;
  --violet2:#a855f7;
  --amber:#f59e0b;
  --amber2:#fbbf24;
  --cyan:#06b6d4;
  --rose:#f43f5e;
  --green:#10b981;
  --text:#f8f8fc;
  --muted:#6b6b8f;
  --muted2:#9898b8;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.04);
  --glow-v:rgba(124,58,237,0.4);
  --font-display:'Clash Display',sans-serif;
  --font-body:'Manrope',sans-serif;
  --font-mono:'Source Code Pro',monospace;
}
html{font-size:16px}
body{background:var(--void);color:var(--text);font-family:var(--font-body);min-height:100vh;display:flex;flex-direction:column;overflow:hidden;cursor:none;position:relative}

/* ── CURSOR ── */
#cursor{position:fixed;width:10px;height:10px;background:var(--amber);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s;mix-blend-mode:difference}
#cursor-ring{position:fixed;width:36px;height:36px;border:1px solid rgba(245,158,11,.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .25s,height .25s,opacity .2s;opacity:.6}

/* ── NOISE ── */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:1;
  background-image:radial-gradient(circle,rgba(255,255,255,.018) 1px,transparent 1px),radial-gradient(circle,rgba(255,255,255,.012) 1px,transparent 1px);
  background-size:4px 4px,7px 7px;background-position:0 0,3px 3px;}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(124,58,237,.4);border-radius:2px}

/* ── ORBS ── */
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(90px);animation:orbFloat 8s ease-in-out infinite}
@keyframes orbFloat{0%,100%{transform:translate(0,0)}33%{transform:translate(20px,-30px)}66%{transform:translate(-15px,20px)}}

/* ── TOP BAR ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.1rem 2.5rem;
  background:rgba(4,4,13,.6);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border2);
}
.back-link{
  display:flex;align-items:center;gap:.45rem;
  font-family:var(--font-mono);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);text-decoration:none;transition:color .2s;
}
.back-link:hover{color:var(--text)}
.back-link svg{transition:transform .2s}
.back-link:hover svg{transform:translateX(-3px)}
.theme-toggle-vm{
  width:34px;height:34px;background:transparent;
  border:1px solid var(--border);color:var(--muted2);
  display:flex;align-items:center;justify-content:center;cursor:none;
  transition:border-color .2s,color .2s;
  clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px));
}
.theme-toggle-vm:hover{border-color:var(--amber);color:var(--amber)}
.theme-toggle-vm .icon-sun{display:block}
.theme-toggle-vm .icon-moon{display:none}
[data-theme="light"] .theme-toggle-vm .icon-sun{display:none}
[data-theme="light"] .theme-toggle-vm .icon-moon{display:block}

/* ── LOGO SWITCHING ── */
.vm-logo-light{display:none}
[data-theme="light"] .vm-logo-dark{display:none}
[data-theme="light"] .vm-logo-light{display:block}

/* ── CENTER LAYOUT ── */
.center{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:5.5rem 1.5rem 2rem;
  position:relative;z-index:2;
}

/* ── LOGIN CARD ── */
.card{
  width:100%;max-width:440px;
  background:rgba(7,7,26,.94);
  border:1px solid rgba(124,58,237,.28);
  clip-path:polygon(0 0,calc(100% - 22px) 0,100% 22px,100% 100%,22px 100%,0 calc(100% - 22px));
  overflow:hidden;
  box-shadow:0 40px 100px rgba(124,58,237,.22),0 0 0 1px rgba(124,58,237,.08);
  animation:fadeUp .55s ease both;
  backdrop-filter:blur(28px);
  position:relative;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
.card-bar{height:3px;background:linear-gradient(90deg,var(--violet),var(--amber),var(--cyan))}
.card-inner{padding:2.4rem 2.4rem 2rem}

/* logo */
.card-logo{display:flex;justify-content:center;margin-bottom:1.6rem}
.card-logo img{height:46px;width:auto}

/* eyebrow badge */
.card-eyebrow{
  display:flex;align-items:center;justify-content:center;gap:.45rem;
  font-family:var(--font-mono);font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--violet2);margin-bottom:1.3rem;
}
.eyebrow-dot{width:5px;height:5px;border-radius:50%;background:var(--violet2);flex-shrink:0;animation:edot 2s infinite}
@keyframes edot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}

/* title */
.card-title{font-family:var(--font-display);font-weight:800;font-size:1.85rem;letter-spacing:-.02em;line-height:1;text-align:center;margin-bottom:.4rem}
.card-sub{font-size:.83rem;color:var(--muted2);font-weight:300;line-height:1.6;text-align:center;margin-bottom:1.8rem}

/* fields */
.field{margin-bottom:1rem}
.field label{
  display:block;font-family:var(--font-mono);font-size:.58rem;letter-spacing:.12em;
  text-transform:uppercase;color:var(--muted2);margin-bottom:.4rem;
}
.input-wrap{position:relative}
.input-wrap svg.fi{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  color:var(--muted);pointer-events:none;transition:color .2s;
}
.input-wrap:focus-within svg.fi{color:var(--violet2)}
.inp{
  width:100%;background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  color:var(--text);font-size:.88rem;font-family:var(--font-body);
  padding:.68rem .85rem .68rem 2.5rem;
  outline:none;transition:border-color .25s,background .25s,box-shadow .25s;
}
.inp::placeholder{color:var(--muted)}
.inp:focus{
  border-color:rgba(124,58,237,.55);
  background:rgba(124,58,237,.05);
  box-shadow:0 0 0 3px rgba(124,58,237,.1);
}
.eye-btn{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--muted);cursor:none;
  display:flex;align-items:center;padding:0;transition:color .2s;
}
.eye-btn:hover{color:var(--muted2)}

/* error */
.error-msg{
  display:none;align-items:center;gap:.55rem;
  background:rgba(244,63,94,.07);border:1px solid rgba(244,63,94,.22);
  padding:.6rem .85rem;font-size:.78rem;color:var(--rose);
  margin-bottom:.9rem;animation:shake .4s ease;
}
.error-msg.show{display:flex}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}

/* sign in button */
.btn-signin{
  width:100%;padding:.88rem;font-family:var(--font-display);font-size:1.05rem;letter-spacing:.06em;
  border:none;cursor:none;margin-top:.5rem;
  background:linear-gradient(135deg,var(--violet),var(--amber2));color:#fff;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
  transition:box-shadow .25s,filter .25s;position:relative;
}
.btn-signin:hover:not(:disabled){box-shadow:0 0 40px rgba(124,58,237,.45);filter:brightness(1.1)}
.btn-signin:disabled{opacity:.5;cursor:not-allowed}
.btn-signin .spinner{
  display:none;width:16px;height:16px;
  border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;
}
.btn-signin.loading .btn-text{display:none}
.btn-signin.loading .spinner{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* google button */
.btn-google{
  width:100%;display:flex;align-items:center;justify-content:center;gap:.7rem;
  padding:.7rem;border:1px solid var(--border);background:transparent;
  color:var(--muted2);font-family:var(--font-body);font-size:.87rem;cursor:none;
  transition:border-color .2s,color .2s,background .2s;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
}
.btn-google:hover{border-color:rgba(255,255,255,.18);color:var(--text);background:rgba(255,255,255,.03)}
[data-theme="light"] .btn-google{border-color:rgba(0,0,0,.12);color:var(--muted2)}
[data-theme="light"] .btn-google:hover{border-color:rgba(0,0,0,.22);background:rgba(0,0,0,.025);color:var(--text)}

/* or divider */
.or-div{
  display:flex;align-items:center;gap:.8rem;
  margin:.9rem 0;font-family:var(--font-mono);font-size:.62rem;
  letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
}
.or-div::before,.or-div::after{content:'';flex:1;height:1px;background:var(--border)}
[data-theme="light"] .or-div::before,[data-theme="light"] .or-div::after{background:rgba(0,0,0,.08)}

/* card footer */
.card-foot{
  margin-top:1.3rem;text-align:center;font-size:.76rem;color:var(--muted);
  padding-top:1.1rem;border-top:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;gap:.5rem;flex-wrap:wrap;
}
.card-foot a{color:var(--violet2);text-decoration:none;transition:color .2s}
.card-foot a:hover{color:var(--amber)}
.foot-sep{color:var(--border);user-select:none}

/* success overlay */
.success-overlay{
  display:none;position:absolute;inset:0;
  background:rgba(7,7,26,.97);
  flex-direction:column;align-items:center;justify-content:center;
  gap:1rem;z-index:10;animation:fadeIn .4s ease both;
}
.success-overlay.show{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.success-icon{
  width:60px;height:60px;
  background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex;align-items:center;justify-content:center;
}
.success-title{font-family:var(--font-display);font-size:1.5rem;font-weight:800;letter-spacing:-.01em}
.success-sub{font-size:.78rem;color:var(--muted2);font-family:var(--font-mono);letter-spacing:.05em}

/* ── LIGHT THEME ── */
[data-theme="light"]{
  --void:#f4f2f5;
  --deep:#ffffff;
  --text:#0d0d1f;
  --muted:#8888b0;
  --muted2:#5c5c80;
  --border:rgba(0,0,0,0.09);
  --border2:rgba(0,0,0,0.05);
}
[data-theme="light"] body{background:var(--void)}
[data-theme="light"] body::before{opacity:.12}
[data-theme="light"] .topbar{background:rgba(244,242,245,.88);border-bottom-color:rgba(0,0,0,.07)}
[data-theme="light"] .back-link{color:var(--muted2)}
[data-theme="light"] .back-link:hover{color:var(--text)}
[data-theme="light"] .card{
  background:rgba(255,255,255,.97);
  border-color:rgba(124,58,237,.2);
  box-shadow:0 40px 80px rgba(124,58,237,.1),0 4px 24px rgba(0,0,0,.08);
}
[data-theme="light"] .inp{background:rgba(0,0,0,.03);border-color:rgba(0,0,0,.1);color:var(--text)}
[data-theme="light"] .inp::placeholder{color:var(--muted)}
[data-theme="light"] .inp:focus{border-color:rgba(124,58,237,.45);background:rgba(124,58,237,.03);box-shadow:0 0 0 3px rgba(124,58,237,.07)}
[data-theme="light"] .card-foot{border-top-color:rgba(0,0,0,.07)}
[data-theme="light"] .success-overlay{background:rgba(255,255,255,.97)}
[data-theme="light"] .orb{opacity:.5}
</style>
</head>
<body>

<canvas id="starfield" style="position:fixed;inset:0;z-index:0;pointer-events:none"></canvas>
<div id="cursor"></div>
<div id="cursor-ring"></div>

<div class="orb" style="width:500px;height:500px;background:rgba(124,58,237,.11);top:-160px;left:-120px"></div>
<div class="orb" style="width:360px;height:360px;background:rgba(245,158,11,.08);bottom:-80px;right:-80px;animation-delay:3.5s"></div>

<!-- ── TOP BAR ── -->
<div class="topbar">
  <a href="VM-landing.html" class="back-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Back to VegaMind
  </a>
  <button class="theme-toggle-vm" onclick="toggleTheme()" aria-label="Toggle theme">
    <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
    </svg>
    <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>
</div>

<!-- ── LOGIN CARD ── -->
<div class="center">
  <div class="card">
    <div class="card-bar"></div>
    <div class="card-inner">

      <!-- success overlay -->
      <div class="success-overlay" id="successOverlay">
        <div class="success-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="success-title">Welcome back</div>
        <div class="success-sub">Redirecting to dashboard…</div>
      </div>

      <!-- logo -->
      <div class="card-logo">
        <img src="logo.png" alt="VegaMind" class="vm-logo-dark">
        <img src="logo-light.png" alt="VegaMind" class="vm-logo-light">
      </div>

      <div class="card-eyebrow">
        <span class="eyebrow-dot"></span>
        Dashboard Portal
      </div>

      <div class="card-title">Welcome back</div>
      <div class="card-sub">Sign in to your VegaMind account</div>

      <!-- google -->
      <button class="btn-google" onclick="googleSignIn()">
        <svg width="17" height="17" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Continue with Google
      </button>

      <div class="or-div">or sign in with email</div>

      <!-- error -->
      <div class="error-msg" id="errorMsg">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
        <span id="errorText">Invalid email or password.</span>
      </div>

      <!-- email -->
      <div class="field">
        <label>Email address</label>
        <div class="input-wrap">
          <svg class="fi" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 7l8 5 8-5M4 7h16v13H4V7z"/></svg>
          <input class="inp" type="email" id="email" placeholder="you@company.com" autocomplete="email">
        </div>
      </div>

      <!-- password -->
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <svg class="fi" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="5" y="11" width="14" height="11" rx="2" stroke="currentColor"/><path stroke-linecap="round" d="M8 11V7a4 4 0 018 0v4"/></svg>
          <input class="inp" type="password" id="password" placeholder="••••••••" autocomplete="current-password">
          <button class="eye-btn" id="eyeBtn" type="button" aria-label="Toggle password">
            <svg id="eyeIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button class="btn-signin" id="loginBtn" onclick="handleLogin()">
        <span class="btn-text">Sign In</span>
        <div class="spinner"></div>
      </button>

      <div class="card-foot">
        <a href="#" onclick="handleReset(event)">Forgot password?</a>
        <span class="foot-sep">·</span>
        <a href="VM-landing.html">Back to home</a>
      </div>
    </div>
  </div>
</div>

<script>
// ── CURSOR ──
var cx=0,cy=0,rx=0,ry=0;
document.addEventListener('mousemove',function(e){
  cx=e.clientX;cy=e.clientY;
  document.getElementById('cursor').style.left=cx+'px';
  document.getElementById('cursor').style.top=cy+'px';
});
setInterval(function(){
  rx+=(cx-rx)*.12;ry+=(cy-ry)*.12;
  var r=document.getElementById('cursor-ring');
  r.style.left=rx+'px';r.style.top=ry+'px';
},16);
document.querySelectorAll('a,button,.card').forEach(function(el){
  el.addEventListener('mouseenter',function(){
    document.getElementById('cursor').style.width='18px';
    document.getElementById('cursor').style.height='18px';
    document.getElementById('cursor-ring').style.width='52px';
    document.getElementById('cursor-ring').style.height='52px';
    document.getElementById('cursor-ring').style.opacity='1';
  });
  el.addEventListener('mouseleave',function(){
    document.getElementById('cursor').style.width='10px';
    document.getElementById('cursor').style.height='10px';
    document.getElementById('cursor-ring').style.width='36px';
    document.getElementById('cursor-ring').style.height='36px';
    document.getElementById('cursor-ring').style.opacity='.6';
  });
});

// ── NEURAL CONSTELLATION ──
(function(){
  var cvs=document.getElementById('starfield');
  var ctx=cvs.getContext('2d');
  var W,H,nodes,mouse={x:-9999,y:-9999};
  var rafId=null,running=false;
  var NODE_COUNT=60,CONN_DIST=140,MOUSE_DIST=180,REPEL_R=90;
  function resize(){W=cvs.width=window.innerWidth;H=cvs.height=window.innerHeight}
  function mkNode(){
    var hub=Math.random()<.15;
    return{x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,r:hub?Math.random()*1.4+1.6:Math.random()*.8+.7,hub:hub,phase:Math.random()*Math.PI*2};
  }
  function init(){nodes=[];for(var i=0;i<NODE_COUNT;i++)nodes.push(mkNode())}
  function palette(){
    var light=document.documentElement.getAttribute('data-theme')==='light';
    return light?{node:[99,102,241],hub:[6,182,212],line:[99,102,241],cursor:[245,158,11]}:{node:[160,160,230],hub:[6,182,212],line:[124,92,237],cursor:[245,158,11]};
  }
  function rgba(rgb,a){return'rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+','+a+')'}
  function draw(){
    if(!running)return;
    ctx.clearRect(0,0,W,H);
    var p=palette(),now=performance.now()/1000;
    for(var i=0;i<nodes.length;i++){
      var n=nodes[i],dx=n.x-mouse.x,dy=n.y-mouse.y,d2=dx*dx+dy*dy;
      if(d2<REPEL_R*REPEL_R&&d2>0){var d=Math.sqrt(d2),f=(REPEL_R-d)/REPEL_R*.5;n.vx+=(dx/d)*f;n.vy+=(dy/d)*f}
      n.vx*=.975;n.vy*=.975;
      var spd=Math.sqrt(n.vx*n.vx+n.vy*n.vy);
      if(spd<.08){n.vx+=(Math.random()-.5)*.06;n.vy+=(Math.random()-.5)*.06}
      n.x+=n.vx;n.y+=n.vy;
      if(n.x<-20)n.x=W+20;if(n.x>W+20)n.x=-20;
      if(n.y<-20)n.y=H+20;if(n.y>H+20)n.y=-20;
    }
    ctx.lineWidth=.6;
    for(var i=0;i<nodes.length;i++){
      for(var j=i+1;j<nodes.length;j++){
        var dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<CONN_DIST){
          var boost=(nodes[i].hub||nodes[j].hub)?1.6:1,a=(1-d/CONN_DIST)*.45*boost;
          ctx.strokeStyle=rgba(p.line,Math.min(a,.7));
          ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);ctx.stroke();
        }
      }
    }
    if(mouse.x>-1000){
      ctx.lineWidth=.8;
      for(var i=0;i<nodes.length;i++){
        var dx=nodes[i].x-mouse.x,dy=nodes[i].y-mouse.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<MOUSE_DIST){ctx.strokeStyle=rgba(p.cursor,(1-d/MOUSE_DIST)*.75);ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(mouse.x,mouse.y);ctx.stroke()}
      }
      ctx.beginPath();ctx.arc(mouse.x,mouse.y,3.5,0,Math.PI*2);ctx.fillStyle=rgba(p.cursor,.85);ctx.fill();
    }
    for(var i=0;i<nodes.length;i++){
      var n=nodes[i],pulse=n.hub?.75+Math.sin(now*1.4+n.phase)*.25:1,r=n.r*pulse;
      if(n.hub){
        ctx.beginPath();ctx.arc(n.x,n.y,r*4.5,0,Math.PI*2);ctx.fillStyle=rgba(p.hub,.06*pulse);ctx.fill();
        ctx.beginPath();ctx.arc(n.x,n.y,r*2,0,Math.PI*2);ctx.fillStyle=rgba(p.hub,.18*pulse);ctx.fill();
        ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);ctx.fillStyle=rgba(p.hub,.95);ctx.fill();
      } else {
        ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);ctx.fillStyle=rgba(p.node,.65);ctx.fill();
      }
    }
    rafId=requestAnimationFrame(draw);
  }
  function start(){if(running)return;running=true;draw()}
  function stop(){running=false;if(rafId){cancelAnimationFrame(rafId);rafId=null}}
  resize();init();
  if(!document.hidden)start();
  document.addEventListener('visibilitychange',function(){document.hidden?stop():start()});
  window.addEventListener('resize',function(){resize();init()});
  document.addEventListener('mousemove',function(e){mouse.x=e.clientX;mouse.y=e.clientY});
  document.addEventListener('mouseleave',function(){mouse.x=-9999;mouse.y=-9999});
})();

function getDashboardUrl(session){
  try{
    var payload=JSON.parse(atob(session.access_token.split('.')[1]));
    var role=payload.user_role||payload.app_metadata?.role||'';
    return role==='super_admin'?'vegamind-admin.html':'VM-clientDashboard.html';
  }catch(e){return'VM-clientDashboard.html'}
}

// auto-redirect if already logged in
(async()=>{

  if(session)window.location.href=getDashboardUrl(session);
})();

function googleSignIn(){
  sb.auth.signInWithOAuth({
    provider:'google',
    options:{redirectTo:window.location.href}
  }).then(function(result){
    if(result.error){showError(result.error.message)}
  });
}

async function handleLogin(){
  hideError();
  var email=document.getElementById('email').value.trim();
  var password=document.getElementById('password').value;
  var btn=document.getElementById('loginBtn');
  if(!email||!password){showError('Please enter your email and password.');return}
  btn.classList.add('loading');btn.disabled=true;
  const{data,error}=await sb.auth.signInWithPassword({email,password});
  if(error){
    btn.classList.remove('loading');btn.disabled=false;
    showError(error.message==='Invalid login credentials'?'Invalid email or password.':error.message);
    return;
  }
  document.getElementById('successOverlay').classList.add('show');
  setTimeout(()=>{window.location.href=getDashboardUrl(data.session)},1200);
}

async function handleReset(e){
  e.preventDefault();
  var email=document.getElementById('email').value.trim();
  if(!email){showError('Enter your email address first, then click Reset.');return}
  const{error}=await sb.auth.resetPasswordForEmail(email,{
    redirectTo:window.location.origin+'/reset-password.html'
  });
  if(error){showError(error.message)}
  else{hideError();alert('Password reset email sent to '+email)}
}

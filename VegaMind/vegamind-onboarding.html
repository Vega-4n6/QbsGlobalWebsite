<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VegaMind — Get Started</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Instrument+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --acc:#7c3aed;--acc-rgb:124,58,237;--acc2:#06b6d4;
  --amber:#f59e0b;--amber2:#fbbf24;--violet2:#a855f7;
  --bg:#04040d;--bg2:#07071a;--bg3:#0c0c28;
  --text:#f8f8fc;--muted:#6b6b8f;--muted2:#9898b8;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.04);
  --green:#10b981;--danger:#ef4444;--warn:#f59e0b;
  --fd:'Syne',sans-serif;--fb:'Instrument Sans',sans-serif;--fm:'DM Mono',monospace;
}
html{font-size:14px}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;display:flex;overflow-x:hidden;cursor:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(124,58,237,.3);border-radius:2px}
/* ── NOISE ── */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:1;background-image:radial-gradient(circle,rgba(255,255,255,.018) 1px,transparent 1px),radial-gradient(circle,rgba(255,255,255,.012) 1px,transparent 1px);background-size:4px 4px,7px 7px;background-position:0 0,3px 3px}
/* ── STARFIELD ── */
#starfield{position:fixed;inset:0;z-index:0;pointer-events:none}
/* ── CURSOR ── */
#cursor{position:fixed;width:10px;height:10px;background:var(--amber);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .1s,width .2s,height .2s;mix-blend-mode:difference}
#cursor-ring{position:fixed;width:36px;height:36px;border:1px solid rgba(245,158,11,.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:transform .12s ease,width .25s,height .25s,opacity .2s;opacity:.6}

/* ── SIDEBAR ── */
#rail{width:260px;min-width:260px;height:100vh;position:sticky;top:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:2rem 1.5rem;z-index:10}
.rail-logo{display:flex;align-items:center;gap:.65rem;margin-bottom:2.5rem}
.rail-gem{width:32px;height:32px;background:linear-gradient(135deg,var(--acc),var(--amber2));flex-shrink:0;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;animation:gemSpin 12s linear infinite}
@keyframes gemSpin{0%,100%{filter:hue-rotate(0deg)}50%{filter:hue-rotate(40deg)}}
.rail-gem svg{color:#fff}
.rail-name{font-family:var(--fd);font-size:1.3rem;letter-spacing:.1em}
.rail-steps{flex:1;display:flex;flex-direction:column;gap:2px}
.rs{display:flex;align-items:flex-start;gap:.75rem;padding:.55rem .7rem;position:relative}
.rs:not(:last-child)::after{content:'';position:absolute;left:calc(.7rem + 12px);top:calc(.55rem + 25px);width:1px;height:calc(100% + 2px);background:var(--border);z-index:0}
.rs.done:not(:last-child)::after{background:rgba(var(--acc-rgb),.3)}
.rs-num{width:24px;height:24px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:.62rem;border:1px solid var(--border);color:var(--muted);clip-path:polygon(0 0,calc(100% - 5px) 0,100% 5px,100% 100%,5px 100%,0 calc(100% - 5px));transition:all .3s;position:relative;z-index:1;background:var(--bg)}
.rs.active .rs-num{background:var(--acc);border-color:var(--acc);color:#09090f;box-shadow:0 0 14px rgba(var(--acc-rgb),.35)}
.rs.done .rs-num{background:rgba(var(--acc-rgb),.1);border-color:rgba(var(--acc-rgb),.3);color:var(--acc)}
.rs-info{flex:1}
.rs-label{font-size:.78rem;font-weight:500;color:var(--muted);transition:color .2s}
.rs.active .rs-label{color:var(--text)}
.rs.done .rs-label{color:var(--muted2)}
.rs-sub{font-size:.6rem;color:var(--muted);font-family:var(--fm);margin-top:.1rem}
.rail-foot{margin-top:auto;padding-top:1.2rem;border-top:1px solid var(--border2)}
.rail-prog-label{display:flex;justify-content:space-between;margin-bottom:.4rem;font-size:.6rem;color:var(--muted);font-family:var(--fm)}
.rail-prog-track{height:2px;background:rgba(255,255,255,.05)}
.rail-prog-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .5s cubic-bezier(.16,1,.3,1)}
.rail-prog-step{font-size:.58rem;color:var(--muted);font-family:var(--fm);margin-top:.35rem}

/* ── MAIN ── */
#main{flex:1;display:flex;align-items:center;justify-content:center;padding:3rem 2rem;min-height:100vh}
.panel{width:100%;max-width:520px;animation:panelIn .35s cubic-bezier(.16,1,.3,1) both}
@keyframes panelIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* ── TYPOGRAPHY ── */
.eyebrow{font-family:var(--fm);font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--acc);margin-bottom:.7rem;display:flex;align-items:center;gap:.5rem}
.eyebrow::before{content:'';width:16px;height:1px;background:var(--acc)}
.panel-title{font-family:var(--fd);font-size:clamp(2.2rem,4vw,3rem);line-height:.95;letter-spacing:.02em;margin-bottom:.65rem}
.panel-sub{font-size:.9rem;color:var(--muted2);font-weight:300;line-height:1.75;margin-bottom:1.6rem}

/* ── FORM ── */
.frow{margin-bottom:.9rem}
.frow:last-of-type{margin-bottom:0}
.flabel{display:block;font-size:.62rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.38rem;font-weight:500}
.finput{width:100%;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.08);color:var(--text);font-family:var(--fb);font-size:.85rem;padding:.58rem .75rem;outline:none;transition:border-color .18s,background .18s,box-shadow .18s}
.finput:focus{border-color:rgba(var(--acc-rgb),.35);background:rgba(var(--acc-rgb),.02);box-shadow:0 0 0 3px rgba(var(--acc-rgb),.06)}
.finput::placeholder{color:rgba(90,90,110,.55)}
.finput.err{border-color:rgba(239,68,68,.4)}
.fhint{font-size:.68rem;color:var(--muted);margin-top:.32rem;font-family:var(--fm);line-height:1.5}
.fhint.red{color:var(--danger)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
.ico-wrap{position:relative}
.ico-wrap .finput{padding-left:2.4rem}
.ico-wrap .ico{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}

/* ── DIVIDER ── */
.divider{display:flex;align-items:center;gap:.8rem;margin:1.1rem 0;font-size:.65rem;color:var(--muted)}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── SOCIAL BTN ── */
.soc-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:.7rem;padding:.62rem;border:1px solid var(--border);background:transparent;color:var(--muted2);font-family:var(--fb);font-size:.82rem;cursor:pointer;transition:all .2s;margin-bottom:.55rem}
.soc-btn:hover{border-color:rgba(255,255,255,.14);color:var(--text);background:rgba(255,255,255,.02)}

/* ── PLAN CARDS ── */
.plan-grid{display:flex;flex-direction:column;gap:.5rem;margin-top:.4rem}
.plan-card{border:1px solid var(--border);padding:.85rem 1rem;cursor:pointer;transition:all .18s;background:rgba(255,255,255,.015);display:flex;align-items:center;gap:.85rem;position:relative}
.plan-card:hover{border-color:rgba(255,255,255,.12);background:rgba(255,255,255,.025)}
.plan-card.sel{border-color:rgba(var(--acc-rgb),.35);background:rgba(var(--acc-rgb),.04)}
.plan-card.sel::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--acc)}
.plan-radio{width:14px;height:14px;border-radius:50%;border:1px solid var(--border);flex-shrink:0;transition:all .18s;position:relative}
.plan-card.sel .plan-radio{border-color:var(--acc);background:rgba(var(--acc-rgb),.15)}
.plan-card.sel .plan-radio::after{content:'';position:absolute;inset:3px;border-radius:50%;background:var(--acc)}
.plan-info{flex:1}
.plan-name{font-size:.8rem;font-weight:600;color:var(--text)}
.plan-desc{font-size:.65rem;color:var(--muted);font-family:var(--fm);margin-top:.1rem}
.plan-price{font-family:var(--fd);font-size:1.1rem;letter-spacing:.04em;color:var(--acc);flex-shrink:0}
.plan-badge{font-size:.55rem;background:rgba(var(--acc-rgb),.1);border:1px solid rgba(var(--acc-rgb),.2);color:var(--acc);padding:.1rem .4rem;font-family:var(--fm);letter-spacing:.06em;margin-left:.4rem;vertical-align:middle}

/* ── BUTTONS ── */
.btn-p{width:100%;padding:.78rem;margin-top:.9rem;background:linear-gradient(135deg,var(--acc),var(--amber2));color:#fff;font-family:var(--fd);font-size:1rem;letter-spacing:.06em;border:none;cursor:none;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));transition:all .22s;font-weight:700}
.btn-p:hover{filter:brightness(1.1);box-shadow:0 0 28px rgba(124,58,237,.45),0 4px 20px rgba(245,158,11,.2);transform:translateY(-1px)}
.btn-p:disabled{opacity:.45;pointer-events:none;transform:none}
.btn-p span{display:flex;align-items:center;justify-content:center;gap:.45rem}
.btn-sec{width:100%;padding:.65rem;margin-top:.45rem;background:transparent;color:var(--muted2);border:1px solid var(--border);cursor:pointer;font-family:var(--fb);font-size:.8rem;transition:all .2s}
.btn-sec:hover{border-color:rgba(255,255,255,.14);color:var(--text)}

/* ── NOTICE ── */
.notice{padding:.85rem 1rem;margin-bottom:1.2rem;display:flex;gap:.65rem}
.notice.warn{background:rgba(245,158,11,.05);border:1px solid rgba(245,158,11,.15)}
.notice.info{background:rgba(var(--acc-rgb),.04);border:1px solid rgba(var(--acc-rgb),.12)}
.notice.success{background:rgba(34,197,94,.05);border:1px solid rgba(34,197,94,.15)}
.notice-icon{flex-shrink:0;margin-top:1px}
.notice-title{font-size:.68rem;font-weight:600;letter-spacing:.05em;margin-bottom:.2rem}
.notice.warn .notice-title{color:var(--warn)}
.notice.info .notice-title{color:var(--acc)}
.notice.success .notice-title{color:var(--green)}
.notice-body{font-size:.78rem;color:var(--muted2);line-height:1.65}

/* ── VERIFY SCREEN ── */
.verify-spinner{display:flex;flex-direction:column;align-items:center;padding:2rem 0 1.5rem;gap:1rem}
.spinner{width:28px;height:28px;border:2px solid rgba(255,255,255,.08);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.verify-status{font-family:var(--fm);font-size:.73rem;color:var(--muted2)}

/* ── PENDING SCREEN ── */
.pending-icon{width:56px;height:56px;background:rgba(var(--acc-rgb),.08);border:1px solid rgba(var(--acc-rgb),.2);clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem;color:var(--acc);animation:pendPulse 2.5s ease-in-out infinite}
@keyframes pendPulse{0%,100%{box-shadow:0 0 0 0 rgba(var(--acc-rgb),.15)}50%{box-shadow:0 0 0 10px rgba(var(--acc-rgb),0)}}
.timeline{display:flex;flex-direction:column;gap:0;margin-top:1.4rem}
.tl-item{display:flex;gap:.85rem;position:relative}
.tl-item:not(:last-child)::after{content:'';position:absolute;left:11px;top:24px;width:1px;height:calc(100% + 1px);background:var(--border)}
.tl-dot{width:23px;height:23px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);background:var(--bg2);position:relative;z-index:1;clip-path:polygon(0 0,calc(100% - 4px) 0,100% 4px,100% 100%,4px 100%,0 calc(100% - 4px))}
.tl-dot.done{background:rgba(var(--acc-rgb),.1);border-color:rgba(var(--acc-rgb),.3);color:var(--acc)}
.tl-dot.pending{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.25);color:var(--warn)}
.tl-dot.waiting{background:rgba(255,255,255,.02);color:var(--muted)}
.tl-body{padding-bottom:1.1rem;flex:1}
.tl-title{font-size:.78rem;font-weight:500;margin-bottom:.15rem}
.tl-desc{font-size:.68rem;color:var(--muted);font-family:var(--fm);line-height:1.5}

/* ── LOADING INLINE ── */
.ld{display:inline-block;width:13px;height:13px;border:2px solid rgba(9,9,15,.3);border-top-color:#09090f;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}

/* ── STATUS BAR ── */
.status-bar{padding:.5rem .85rem;margin-bottom:.9rem;font-size:.7rem;font-family:var(--fm);display:flex;align-items:center;gap:.5rem}
.status-bar.err{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);color:var(--danger)}
.status-bar.ok{background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.15);color:var(--green)}

/* ── TOAST ── */
#toaster{position:fixed;bottom:1.3rem;right:1.3rem;z-index:999;display:flex;flex-direction:column;gap:.4rem;pointer-events:none}
.toast{background:var(--bg3);border:1px solid var(--border);padding:.58rem .9rem;display:flex;align-items:center;gap:.5rem;font-size:.74rem;min-width:210px;pointer-events:all;clip-path:polygon(0 0,calc(100% - 7px) 0,100% 7px,100% 100%,7px 100%,0 calc(100% - 7px));animation:tIn .2s ease}
@keyframes tIn{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:none}}
.toast.out{animation:tOut .2s ease forwards}
@keyframes tOut{to{opacity:0;transform:translateX(8px)}}
.tdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.tdot.success{background:var(--green)}.tdot.error{background:var(--danger)}.tdot.info{background:var(--acc2)}.tdot.warn{background:var(--warn)}

@media(max-width:780px){
  #rail{display:none}
  #main{padding:2rem 1.2rem}
  .f2{grid-template-columns:1fr}
}
</style>
</head>
<body>
<canvas id="starfield"></canvas>
<div id="cursor"></div>
<div id="cursor-ring"></div>

<nav id="rail">
  <div class="rail-logo">
    <div class="rail-gem">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    </div>
    <div>
      <div style="font-family:var(--fd);font-size:1.25rem;letter-spacing:.1em">VegaMind</div>
      <div style="font-size:.58rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:1px">Get Started</div>
    </div>
  </div>
  <div class="rail-steps" id="rail-steps"></div>
  <div class="rail-foot">
    <div class="rail-prog-label"><span>PROGRESS</span><span id="prog-pct">0%</span></div>
    <div class="rail-prog-track"><div class="rail-prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="rail-prog-step" id="prog-step">Step 1 of 4</div>
  </div>
</nav>

<main id="main">
  <div class="panel" id="panel"></div>
</main>

<div id="toaster"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════════
var SBURL      = 'https://lyiqesxemmisigccslfn.supabase.co';
var SBANON     = 'sb_publishable_vrtqJqLhB7Nw8viAFZPKCw_k2mpMzkS';
var DASHBOARD  = 'VM-clientDashboard.html';
var LOGIN      = 'vegamind-login.html';

var sb = supabase.createClient(SBURL, SBANON);

// Plan IDs from Supabase (Section 3.2 of handoff doc)
var PLAN_IDS = {
  spark: '5e9de717-5b8b-4e95-8b80-1c952d748e58',
  orbit: '43926261-0c7c-4526-be19-a52146592a8f'
};

// ═══════════════════════════════════════════════════════════════════
// STATE  — single source of truth, never mutated directly in render
// ═══════════════════════════════════════════════════════════════════
var S = {
  step: 1,
  // Auth
  email: '', password: '',
  userId: '', accessToken: '', tenantId: '',
  // Details (step 3)
  firstName: '', lastName: '', company: '', website: '',
  plan: 'spark',
  // Internal flags
  profileSaved: false,  // true once ensureProfile() succeeded
  submitted: false,     // true once step 3 saved — prevents double-submit
};

var STEPS = [
  { n:1, label:'Create Account', sub:'Email & password'    },
  { n:2, label:'Verify Email',   sub:'Click the link sent' },
  { n:3, label:'Your Details',   sub:'Plan & business info'},
  { n:4, label:'Pending Review', sub:'Admin activates you' },
];

// ═══════════════════════════════════════════════════════════════════
// POLL TIMER — only ONE timer ever runs. Always cancelled on navigate.
// ═══════════════════════════════════════════════════════════════════
var _pollTimer = null;
function clearPoll() {
  if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
}

// ═══════════════════════════════════════════════════════════════════
// SUPABASE REST HELPER
// ═══════════════════════════════════════════════════════════════════
function sbRest(method, table, body, opts) {
  opts = opts || {};
  var url = SBURL + '/rest/v1/' + table + (opts.query ? '?' + opts.query : '');
  return fetch(url, {
    method: method,
    headers: {
      'apikey':        SBANON,
      'Authorization': 'Bearer ' + (S.accessToken || SBANON),
      'Content-Type':  'application/json',
      'Prefer':        opts.prefer || 'return=representation',
    },
    body: body ? JSON.stringify(body) : undefined,
  }).then(function(r) {
    // 204 No Content is success with no body
    if (r.status === 204) return null;
    if (!r.ok) return r.text().then(function(t) {
      var msg = t;
      try { var j = JSON.parse(t); msg = j.message || j.details || j.hint || t; } catch(e){}
      throw new Error(msg);
    });
    return r.json();
  });
}

// ═══════════════════════════════════════════════════════════════════
// RAIL RENDER
// ═══════════════════════════════════════════════════════════════════
function renderRail() {
  var el = document.getElementById('rail-steps');
  el.innerHTML = '';
  STEPS.forEach(function(s) {
    var div = document.createElement('div');
    var cls = 'rs' + (S.step === s.n ? ' active' : S.step > s.n ? ' done' : '');
    div.className = cls;
    var numContent = S.step > s.n
      ? '<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>'
      : ('0' + s.n).slice(-2);
    div.innerHTML =
      '<div class="rs-num">' + numContent + '</div>' +
      '<div class="rs-info"><div class="rs-label">' + s.label + '</div><div class="rs-sub">' + s.sub + '</div></div>';
    el.appendChild(div);
  });
  var pct = Math.round(((S.step - 1) / (STEPS.length - 1)) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-step').textContent = 'Step ' + S.step + ' of ' + STEPS.length;
}

// ═══════════════════════════════════════════════════════════════════
// NAVIGATE — always clears poll before moving
// ═══════════════════════════════════════════════════════════════════
function goTo(n) {
  clearPoll();
  S.step = n;
  render();
  window.scrollTo(0, 0);
}

// ═══════════════════════════════════════════════════════════════════
// ESCAPE HELPER
// ═══════════════════════════════════════════════════════════════════
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════
function render() {
  renderRail();
  var panel = document.getElementById('panel');
  // Force reflow for animation replay
  panel.style.animation = 'none';
  void panel.offsetWidth;
  panel.style.animation = '';

  switch(S.step) {

    // ── STEP 1: CREATE ACCOUNT ─────────────────────────────────────
    case 1:
      panel.innerHTML =
        '<div class="eyebrow">Step 01 — Account</div>' +
        '<h1 class="panel-title">Create your<br>account.</h1>' +
        '<p class="panel-sub">Start your free trial. No credit card required — our team will be in touch once you\'re set up.</p>' +

        '<button class="soc-btn" onclick="googleSignup()">' +

function tlItem(state, title, desc) {
  var icons = {
    done:    '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>',
    pending: '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>',
    waiting: '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>',
  };
  return '<div class="tl-item">' +
    '<div class="tl-dot ' + state + '">' + icons[state] + '</div>' +
    '<div class="tl-body"><div class="tl-title">' + esc(title) + '</div><div class="tl-desc">' + esc(desc) + '</div></div>' +
  '</div>';
}

function renderPlanCards() {
  var plans = [
    { id:'spark', name:'Spark', price:'Free', desc:'1 bot · 20 messages/month' },
    { id:'orbit', name:'Orbit', price:'$24/mo', desc:'Unlimited bots · 200 messages/month', badge:'POPULAR' },
  ];
  return plans.map(function(p) {
    var badge = p.badge ? '<span class="plan-badge">' + p.badge + '</span>' : '';
    return '<div class="plan-card' + (S.plan === p.id ? ' sel' : '') + '" onclick="selectPlan(\'' + p.id + '\')" id="plan-' + p.id + '">' +
      '<div class="plan-radio"></div>' +
      '<div class="plan-info"><div class="plan-name">' + p.name + badge + '</div><div class="plan-desc">' + p.desc + '</div></div>' +
      '<div class="plan-price">' + p.price + '</div>' +
    '</div>';
  }).join('');
}

function selectPlan(id) {
  S.plan = id;
  // Scope strictly to #plan-grid — no risk of touching other elements
  var cards = document.querySelectorAll('#plan-grid .plan-card');
  cards.forEach(function(c) { c.classList.remove('sel'); });
  var card = document.getElementById('plan-' + id);
  if (card) card.classList.add('sel');
}

// ═══════════════════════════════════════════════════════════════════
// STEP 1 SUBMIT
// ═══════════════════════════════════════════════════════════════════
function submitStep1() {
  var email = (document.getElementById('f-email').value || '').trim();
  var pw    = (document.getElementById('f-pw').value    || '');
  var statusEl = document.getElementById('s1-status');

  // Validate
  if (!email || !email.includes('@') || !email.includes('.')) {
    showStatus(statusEl, 'Please enter a valid email address.', 'err');
    document.getElementById('f-email').classList.add('err');
    return;
  }
  if (pw.length < 8) {
    showStatus(statusEl, 'Password must be at least 8 characters.', 'err');
    document.getElementById('f-pw').classList.add('err');
    return;
  }

  S.email = email; S.password = pw;
  var btn = document.getElementById('btn-s1');
  setBtnLoading(btn, 'Creating account…');

  // The email link will redirect back to THIS page
  var redirectTo = window.location.origin + window.location.pathname;

  sb.auth.signUp({ email: email, password: pw, options: { emailRedirectTo: redirectTo } })
    .then(function(res) {
      if (res.error) {
        // Already registered → send to login
        if (res.error.message && res.error.message.toLowerCase().indexOf('already registered') !== -1) {
          showStatus(statusEl, 'This email is already registered.', 'err');
          setTimeout(function() { window.location.href = LOGIN; }, 2000);
          return;
        }
        throw res.error;
      }

      var user = res.data.user;
      if (!user) throw new Error('Signup returned no user. Please try again.');

      S.userId = user.id;

      // Auto-confirm is on → session exists immediately → skip step 2
      if (res.data.session) {
        S.accessToken = res.data.session.access_token;
        extractTenantFromToken(res.data.session.access_token);
        toast('Account created!', 'success');
        goTo(3);
        return;
      }

      // Normal flow → email confirmation required
      toast('Check your inbox for the confirmation link.', 'info');
      goTo(2);
    })
    .catch(function(err) {
      showStatus(statusEl, err.message || 'Signup failed. Please try again.', 'err');
      setBtnReady(btn, 'CREATE ACCOUNT →');
    });
}

// ═══════════════════════════════════════════════════════════════════
// STEP 2: EMAIL VERIFICATION POLL
// ═══════════════════════════════════════════════════════════════════
function startVerifyPoll() {
  // Guard — never start a second timer
  clearPoll();

  _pollTimer = setInterval(function() {
    sb.auth.getSession().then(function(res) {
      var session = res.data && res.data.session;
      if (session && session.user && session.user.email_confirmed_at) {
        clearPoll();
        onEmailVerified(session);
      }
    });
  }, 3000);
}

function onEmailVerified(session) {
  S.accessToken = session.access_token;
  S.userId = session.user.id;
  S.email  = session.user.email || S.email;
  extractTenantFromToken(session.access_token);

  // Pull name from OAuth metadata if present
  var meta = session.user.user_metadata || {};
  if (meta.full_name && !S.firstName) {
    var parts = meta.full_name.split(' ');
    S.firstName = parts[0] || '';
    S.lastName  = parts.slice(1).join(' ') || '';
  }

  var statusEl = document.getElementById('verify-status');
  if (statusEl) statusEl.textContent = 'Verified! Continuing…';

  toast('Email verified!', 'success');
  setTimeout(function() { goTo(3); }, 600);
}

function resendEmail() {
  if (!S.email) { toast('No email on record.', 'error'); return; }
  sb.auth.resend({ type: 'signup', email: S.email })
    .then(function(res) {
      if (res.error) throw res.error;
      toast('Confirmation email resent.', 'success');
    })
    .catch(function(err) { toast(err.message || 'Could not resend.', 'error'); });
}

// ═══════════════════════════════════════════════════════════════════
// STEP 3 SUBMIT
// ═══════════════════════════════════════════════════════════════════
function submitStep3() {
  // Prevent double-submit
  if (S.submitted) { toast('Already submitted — please wait.', 'info'); return; }

  var fn  = (document.getElementById('f-fn').value || '').trim();
  var ln  = (document.getElementById('f-ln').value || '').trim();
  var co  = (document.getElementById('f-co').value || '').trim();
  var ws  = (document.getElementById('f-ws').value || '').trim();
  var statusEl = document.getElementById('s3-status');

  if (!fn) { showStatus(statusEl, 'First name is required.', 'err'); document.getElementById('f-fn').focus(); return; }
  if (!ws) { showStatus(statusEl, 'Website URL is required — the bot needs it.', 'err'); document.getElementById('f-ws').focus(); return; }

  // Normalise URL
  if (ws.indexOf('http') !== 0) ws = 'https://' + ws;
  if (ws.indexOf('.') === -1)   { showStatus(statusEl, 'Please enter a valid URL (e.g. mycompany.ae).', 'err'); return; }

  S.firstName = fn; S.lastName = ln; S.company = co; S.website = ws;

  var btn = document.getElementById('btn-s3');
  setBtnLoading(btn, 'Setting up your account…');

  // ── Ensure we have an access token ──
  getValidSession()
    .then(function(session) {
      S.accessToken = session.access_token;
      S.userId = session.user.id;
      S.email  = session.user.email || S.email;
      extractTenantFromToken(session.access_token);
      return ensureProfile();
    })
    .then(function() {
      // Save details to auth user metadata (no RLS — always works)
      return sb.auth.updateUser({
        data: {
          first_name:  S.firstName,
          last_name:   S.lastName,
          company:     S.company,
          website_url: S.website,
          plan:        S.plan,
          onboarding_submitted_at: new Date().toISOString(),
        }
      });
    })
    .then(function(res) {
      if (res.error) throw res.error;
      // Update tenant name and plan_id if we have tenantId
      if (S.tenantId) {
        return sbRest('PATCH', 'tenants', {
          name:    S.company || (S.firstName + '\'s Workspace'),
          plan_id: PLAN_IDS[S.plan] || PLAN_IDS['spark'],
        }, { query: 'id=eq.' + S.tenantId, prefer: 'return=minimal' })
        .catch(function(err) {
          // Non-fatal — admin can set this manually
          console.warn('Tenant update skipped:', err.message);
        });
      }
    })
    .then(function() {
      S.submitted = true;
      toast('Application submitted!', 'success');
      goTo(4);
    })
    .catch(function(err) {
      console.error('Step 3 error:', err);
      showStatus(statusEl, err.message || 'Something went wrong. Please try again.', 'err');
      setBtnReady(btn, 'SUBMIT APPLICATION →');
    });
}

// ═══════════════════════════════════════════════════════════════════
// ENSURE PROFILE — calls SECURITY DEFINER RPC to create tenant+profile
// if they don't exist yet. Safe to call multiple times (idempotent).
// ═══════════════════════════════════════════════════════════════════
function ensureProfile() {
  return fetch(SBURL + '/rest/v1/rpc/ensure_user_profile', {
    method: 'POST',
    headers: {
      'apikey':        SBANON,
      'Authorization': 'Bearer ' + S.accessToken,
      'Content-Type':  'application/json',
    },
    body: '{}',
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data && data.tenant_id) {
      S.tenantId = data.tenant_id;
      return;
    }
    // RPC didn't return tenant_id — fall back to JWT value
    if (S.tenantId) return;
    throw new Error('Could not set up your account. Please contact support.');
  })
  .catch(function(err) {
    // If we already have tenantId from JWT, don't block the flow
    if (S.tenantId) { console.warn('ensureProfile warn (non-fatal):', err.message); return; }
    throw err;
  });
}

// ═══════════════════════════════════════════════════════════════════
// GET VALID SESSION — ensures we have a live session before step 3
// ═══════════════════════════════════════════════════════════════════
function getValidSession() {
  return sb.auth.getSession().then(function(res) {
    if (res.data && res.data.session) return res.data.session;
    throw new Error('No active session. Please sign in again.');
  });
}

// ═══════════════════════════════════════════════════════════════════
// GOOGLE OAUTH
// ═══════════════════════════════════════════════════════════════════
function googleSignup() {
  sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + window.location.pathname + '?step=3' }
  }).then(function(res) {
    if (res.error) toast(res.error.message, 'error');
    // Browser redirects to Google — nothing else to do here
  });
}

// ═══════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════
function extractTenantFromToken(token) {
  try {
    var payload = JSON.parse(atob(token.split('.')[1]));
    if (payload.tenant_id) S.tenantId = payload.tenant_id;
  } catch(e) {}
}

function showStatus(el, msg, type) {
  if (!el) return;
  el.innerHTML = '<div class="status-bar ' + (type === 'err' ? 'err' : 'ok') + '">' +
    '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
    (type === 'err'
      ? '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>'
      : '<polyline points="20 6 9 17 4 12"/>') +
    '</svg>' + esc(msg) + '</div>';
}

function setBtnLoading(btn, text) {
  if (!btn) return;
  btn.disabled = true;
  btn.innerHTML = '<span><span class="ld"></span> ' + text + '</span>';
}

function setBtnReady(btn, text) {
  if (!btn) return;
  btn.disabled = false;
  btn.innerHTML = '<span>' + text + '</span>';
}

// ═══════════════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════════════
function toast(msg, type) {
  var t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = '<div class="tdot ' + (type||'info') + '"></div><span>' + esc(msg) + '</span>';
  document.getElementById('toaster').appendChild(t);
  setTimeout(function() {
    t.classList.add('out');
    setTimeout(function() { t.remove(); }, 280);
  }, 3000);
}

// ═══════════════════════════════════════════════════════════════════
// INIT — runs once on page load
// ═══════════════════════════════════════════════════════════════════
(function init() {
  var hash   = window.location.hash || '';
  var params = new URLSearchParams(window.location.search);
  var stepParam = parseInt(params.get('step')) || 0;

  // ── Listen for auth state (catches email confirmation hash redirect) ──
  sb.auth.onAuthStateChange(function(event, session) {
    if ((event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') && session) {
      S.accessToken = session.access_token;
      S.userId      = session.user.id;
      S.email       = session.user.email || S.email;
      extractTenantFromToken(session.access_token);

      // Pull OAuth name if available
      var meta = session.user.user_metadata || {};
      if (meta.full_name && !S.firstName) {
        var parts = meta.full_name.split(' ');
        S.firstName = parts[0] || '';
        S.lastName  = parts.slice(1).join(' ') || '';
      }

      // Coming from email confirmation link (hash contains access_token)
      if (hash.indexOf('access_token=') !== -1 && S.step <= 2) {
        clearPoll();
        // Clean up messy hash from URL
        if (window.history.replaceState) {
          window.history.replaceState(null, '', window.location.pathname);
        }
        toast('Email verified!', 'success');
        S.step = 3;
        render();
        return;
      }

      // Coming back from Google OAuth with ?step=3
      if (event === 'SIGNED_IN' && stepParam >= 3 && S.step < 3) {
        S.step = 3;
        render();
      }
    }
  });

  // ── Check for existing session ──
  sb.auth.getSession().then(function(res) {
    var session = res.data && res.data.session;

    if (!session) {
      // No session — check if we're mid-email-confirmation (hash in URL)
      // onAuthStateChange will handle it. Just render step 1.
      if (hash.indexOf('access_token=') !== -1) {
        // Still waiting for onAuthStateChange to fire — render step 2 as placeholder
        S.step = 2;
      } else {
        S.step = 1;
      }
      render();
      return;
    }

    // ── Has session ──
    S.accessToken = session.access_token;
    S.userId      = session.user.id;
    S.email       = session.user.email || '';
    extractTenantFromToken(session.access_token);

    // Google OAuth return
    if (stepParam >= 3) {
      var meta = session.user.user_metadata || {};
      if (meta.full_name && !S.firstName) {
        var parts = meta.full_name.split(' ');
        S.firstName = parts[0] || '';
        S.lastName  = parts.slice(1).join(' ') || '';
      }
      S.step = 3;
      render();
      return;
    }

    // Email confirmation hash → onAuthStateChange handles it
    if (hash.indexOf('access_token=') !== -1) {
      S.step = 2;
      render();
      return;
    }

    // Returning user — check if they already have bots (fully onboarded)
    if (S.tenantId) {
      sbRest('GET', 'bots', null, { query: 'tenant_id=eq.' + S.tenantId + '&limit=1&select=id' })
        .then(function(bots) {
          if (bots && bots.length > 0) {
            // Fully onboarded → send to dashboard
            window.location.href = DASHBOARD;
          } else {
            // Has account, no bots yet — they may be pending or partway through step 3
            S.step = S.submitted ? 4 : 3;
            render();
          }
        })
        .catch(function() {
          S.step = 3;
          render();
        });
    } else {
      // Has auth but no tenant yet — continue from step 3
      S.step = 3;
      render();
    }
  });
})();

// ── CURSOR ──
var _cx=0,_cy=0,_rx=0,_ry=0;
document.addEventListener('mousemove',function(e){
  _cx=e.clientX;_cy=e.clientY;
  document.getElementById('cursor').style.left=_cx+'px';
  document.getElementById('cursor').style.top=_cy+'px';
});
setInterval(function(){
  _rx+=(_cx-_rx)*.12;_ry+=(_cy-_ry)*.12;
  var r=document.getElementById('cursor-ring');
  if(r){r.style.left=_rx+'px';r.style.top=_ry+'px';}
},16);
document.querySelectorAll('a,button,.plan-card,.soc-btn').forEach(function(el){
  el.addEventListener('mouseenter',function(){
    var c=document.getElementById('cursor');if(c){c.style.width='18px';c.style.height='18px';}
    var cr=document.getElementById('cursor-ring');if(cr){cr.style.width='52px';cr.style.height='52px';cr.style.opacity='1';}
  });
  el.addEventListener('mouseleave',function(){
    var c=document.getElementById('cursor');if(c){c.style.width='10px';c.style.height='10px';}
    var cr=document.getElementById('cursor-ring');if(cr){cr.style.width='36px';cr.style.height='36px';cr.style.opacity='.6';}
  });
});

// ── NEURAL CONSTELLATION ──
(function(){
  var cvs=document.getElementById('starfield');
  var ctx=cvs.getContext('2d');
  var W,H,nodes,mouse={x:-9999,y:-9999};
  var rafId=null,running=false;
  var NODE_COUNT=55,CONN_DIST=140,MOUSE_DIST=200,REPEL_R=100;
  function resize(){W=cvs.width=window.innerWidth;H=cvs.height=window.innerHeight;}
  function mkNode(){var hub=Math.random()<.15;return{x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,r:hub?Math.random()*1.4+1.6:Math.random()*.8+.7,hub:hub,phase:Math.random()*Math.PI*2};}
  function init(){nodes=[];for(var i=0;i<NODE_COUNT;i++)nodes.push(mkNode());}
  function rgba(rgb,a){return'rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+','+a+')';}
  function draw(){
    if(!running)return;
    ctx.clearRect(0,0,W,H);
    var now=performance.now()/1000;
    var p={node:[160,160,230],hub:[6,182,212],line:[124,92,237],cursor:[245,158,11]};
    for(var i=0;i<nodes.length;i++){var n=nodes[i];var dx=n.x-mouse.x,dy=n.y-mouse.y;var d2=dx*dx+dy*dy;if(d2<REPEL_R*REPEL_R&&d2>0){var d=Math.sqrt(d2);var f=(REPEL_R-d)/REPEL_R*.5;n.vx+=(dx/d)*f;n.vy+=(dy/d)*f;}n.vx*=.975;n.vy*=.975;var spd=Math.sqrt(n.vx*n.vx+n.vy*n.vy);if(spd<.08){n.vx+=(Math.random()-.5)*.06;n.vy+=(Math.random()-.5)*.06;}n.x+=n.vx;n.y+=n.vy;if(n.x<-20)n.x=W+20;if(n.x>W+20)n.x=-20;if(n.y<-20)n.y=H+20;if(n.y>H+20)n.y=-20;}
    ctx.lineWidth=.6;
    for(var i=0;i<nodes.length;i++){for(var j=i+1;j<nodes.length;j++){var dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y;var d=Math.sqrt(dx*dx+dy*dy);if(d<CONN_DIST){var boost=(nodes[i].hub||nodes[j].hub)?1.6:1;var a=(1-d/CONN_DIST)*.45*boost;ctx.strokeStyle=rgba(p.line,Math.min(a,.7));ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);ctx.stroke();}}}
    if(mouse.x>-1000){ctx.lineWidth=.8;for(var i=0;i<nodes.length;i++){var dx=nodes[i].x-mouse.x,dy=nodes[i].y-mouse.y;var d=Math.sqrt(dx*dx+dy*dy);if(d<MOUSE_DIST){var a=(1-d/MOUSE_DIST)*.75;ctx.strokeStyle=rgba(p.cursor,a);ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(mouse.x,mouse.y);ctx.stroke();}}ctx.beginPath();ctx.arc(mouse.x,mouse.y,3.5,0,Math.PI*2);ctx.fillStyle=rgba(p.cursor,.85);ctx.fill();}
    for(var i=0;i<nodes.length;i++){var n=nodes[i];var pulse=n.hub?.75+Math.sin(now*1.4+n.phase)*.25:1;var r=n.r*pulse;if(n.hub){ctx.beginPath();ctx.arc(n.x,n.y,r*4.5,0,Math.PI*2);ctx.fillStyle=rgba(p.hub,.06*pulse);ctx.fill();ctx.beginPath();ctx.arc(n.x,n.y,r*2,0,Math.PI*2);ctx.fillStyle=rgba(p.hub,.18*pulse);ctx.fill();ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);ctx.fillStyle=rgba(p.hub,.95);ctx.fill();}else{ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);ctx.fillStyle=rgba(p.node,.65);ctx.fill();}}
    rafId=requestAnimationFrame(draw);
  }
  function start(){if(running)return;running=true;draw();}
  function stop(){running=false;if(rafId){cancelAnimationFrame(rafId);rafId=null;}}
  resize();init();
  if(!document.hidden)start();
  document.addEventListener('visibilitychange',function(){document.hidden?stop():start();});
  window.addEventListener('resize',function(){resize();init();});
  document.addEventListener('mousemove',function(e){mouse.x=e.clientX;mouse.y=e.clientY;});
  document.addEventListener('mouseleave',function(){mouse.x=-9999;mouse.y=-9999;});
})();
</script>
</body>

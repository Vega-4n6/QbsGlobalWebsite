<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VegaMind — Get Started</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Manrope:wght@300;400;500;600&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --void:#04040d;
  --deep:#07071a;
  --mid:#0c0c28;
  --surface:#0e0e2a;
  --violet:#7c3aed;
  --violet2:#a855f7;
  --vdim:rgba(124,58,237,0.1);
  --vborder:rgba(124,58,237,0.22);
  --amber:#f59e0b;
  --amber2:#fbbf24;
  --adim:rgba(245,158,11,0.08);
  --aborder:rgba(245,158,11,0.22);
  --green:#10b981;
  --red:#ef4444;
  --text:#f8f8fc;
  --muted:#5c5c7a;
  --muted2:#9090b0;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.04);
  --font-d:'Clash Display',sans-serif;
  --font-b:'Manrope',sans-serif;
  --font-m:'Source Code Pro',monospace;
}
html{font-size:16px}
body{background:var(--void);color:var(--text);font-family:var(--font-b);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;cursor:none}

/* cursor */
#cur{position:fixed;width:9px;height:9px;background:var(--amber);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .15s,height .15s}
#cur-r{position:fixed;width:30px;height:30px;border:1px solid rgba(245,158,11,.3);pointer-events:none;z-index:9998;transform:translate(-50%,-50%);clip-path:polygon(0 0,calc(100% - 7px) 0,100% 7px,100% 100%,7px 100%,0 calc(100% - 7px));transition:left .09s ease,top .09s ease,width .2s,height .2s}

/* noise */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:.5}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(124,58,237,.35)}

/* ══ SHELL ══ */
.shell{display:grid;grid-template-columns:300px 1fr;min-height:100vh;position:relative;z-index:1}

/* ══ RAIL ══ */
.rail{background:rgba(7,7,26,.95);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:2.2rem 1.8rem;position:sticky;top:0;height:100vh;overflow:hidden}

.rail-logo{display:flex;align-items:center;gap:.65rem;margin-bottom:2.8rem;text-decoration:none}
.gem{width:32px;height:32px;flex-shrink:0;background:linear-gradient(135deg,var(--violet),var(--amber));clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;animation:gemGlow 3s ease-in-out infinite}
@keyframes gemGlow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3)}}
.gem::after{content:'V';font-family:var(--font-d);font-weight:800;font-size:.8rem;color:#fff}
.logo-w{font-family:var(--font-d);font-weight:800;font-size:1.15rem;letter-spacing:-.01em}
.logo-w span{color:var(--amber)}
.logo-s{font-size:.58rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:1px}

.steps{flex:1;display:flex;flex-direction:column;gap:2px}
.sr{display:flex;align-items:flex-start;gap:.8rem;padding:.6rem .7rem;position:relative;transition:background .2s}
.sr.active{background:rgba(124,58,237,.08);border-radius:2px}
.sr:not(:last-child)::after{content:'';position:absolute;left:calc(.7rem + 13px);top:calc(.6rem + 27px);width:1px;height:calc(100% + 2px - .6rem + 14px);background:var(--border);z-index:0}
.sr.done:not(:last-child)::after{background:rgba(124,58,237,.3)}

.sb{width:26px;height:26px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-m);font-size:.65rem;border:1px solid var(--border);color:var(--muted);clip-path:polygon(0 0,calc(100% - 5px) 0,100% 5px,100% 100%,5px 100%,0 calc(100% - 5px));transition:all .3s;position:relative;z-index:1;background:var(--void)}
.sr.active .sb{background:var(--violet);border-color:var(--violet);color:#fff;box-shadow:0 0 14px rgba(124,58,237,.4)}
.sr.done .sb{background:rgba(124,58,237,.15);border-color:var(--vborder);color:var(--violet2)}

.si{flex:1;min-width:0}
.sl{font-size:.78rem;font-weight:500;color:var(--muted);transition:color .2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr.active .sl{color:var(--text)}
.sr.done .sl{color:var(--muted2)}
.ss{font-size:.62rem;color:var(--muted);font-family:var(--font-m);margin-top:.1rem}
.sck{width:14px;height:14px;flex-shrink:0;margin-top:6px;background:rgba(124,58,237,.2);border:1px solid var(--vborder);display:none;align-items:center;justify-content:center;clip-path:polygon(0 0,calc(100% - 3px) 0,100% 3px,100% 100%,3px 100%,0 calc(100% - 3px))}
.sr.done .sck{display:flex}

.rail-foot{margin-top:auto;padding-top:1.5rem;border-top:1px solid var(--border2)}
.rf-label{display:flex;justify-content:space-between;margin-bottom:.5rem}
.rf-t{font-size:.65rem;color:var(--muted);font-family:var(--font-m)}
.rf-track{height:2px;background:rgba(255,255,255,.05)}
.rf-fill{height:100%;background:linear-gradient(90deg,var(--violet),var(--amber));transition:width .5s cubic-bezier(.16,1,.3,1)}
.rf-s{font-size:.6rem;color:var(--muted);margin-top:.4rem;font-family:var(--font-m)}

/* ══ CONTENT ══ */
.content{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 2rem;min-height:100vh}
.panel{width:100%;max-width:580px;animation:panelIn .4s cubic-bezier(.16,1,.3,1) both}
@keyframes panelIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

.eyebrow{font-family:var(--font-m);font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem}
.eyebrow::before{content:'';width:18px;height:1px;background:var(--amber)}
.ptitle{font-family:var(--font-d);font-weight:800;font-size:clamp(2.4rem,4vw,3.2rem);line-height:.95;letter-spacing:-.03em;margin-bottom:.7rem}
.psub{font-size:1rem;color:var(--muted2);font-weight:300;line-height:1.7;margin-bottom:1.8rem}

/* form */
.frow{margin-bottom:1.1rem}
.flabel{display:block;font-size:.7rem;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.45rem;font-weight:500}
.finput{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--text);font-family:var(--font-b);font-size:.93rem;padding:.72rem .9rem;outline:none;transition:border-color .2s,background .2s,box-shadow .2s}
.finput:focus{border-color:var(--vborder);background:rgba(124,58,237,.03);box-shadow:0 0 0 3px rgba(124,58,237,.07)}
.finput::placeholder{color:var(--muted)}
textarea.finput{resize:vertical;min-height:72px;line-height:1.55}
.fhint{font-size:.73rem;color:var(--muted);margin-top:.35rem;font-family:var(--font-m)}
.fhint.err{color:var(--red)}
.fhint.ok{color:var(--green)}
.icow{position:relative}
.icow .finput{padding-left:2.5rem}
.ico{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}

.f2{display:grid;grid-template-columns:1fr 1fr;gap:.9rem}

/* divider */
.odiv{display:flex;align-items:center;gap:.9rem;margin:1.2rem 0;font-size:.7rem;color:var(--muted)}
.odiv::before,.odiv::after{content:'';flex:1;height:1px;background:var(--border)}

/* social */
.soc-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:.75rem;padding:.68rem;border:1px solid var(--border);background:transparent;color:var(--muted2);font-family:var(--font-b);font-size:.85rem;cursor:none;transition:all .2s;margin-bottom:.6rem}
.soc-btn:hover{border-color:rgba(255,255,255,.14);color:var(--text);background:rgba(255,255,255,.02)}

/* primary btn */
.btn-p{width:100%;padding:.82rem;margin-top:.9rem;background:linear-gradient(135deg,var(--violet),var(--violet2));color:#fff;font-family:var(--font-d);font-size:1rem;font-weight:600;letter-spacing:.04em;border:none;cursor:none;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));transition:all .25s;position:relative;overflow:hidden}
.btn-p::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--amber),var(--violet2));opacity:0;transition:opacity .3s}
.btn-p:hover::before{opacity:1}
.btn-p:hover{box-shadow:0 0 32px rgba(124,58,237,.38);transform:translateY(-1px)}
.btn-p span{position:relative;z-index:1}
.btn-p:disabled{opacity:.5;pointer-events:none}
.btn-sec{width:100%;padding:.7rem;margin-top:.5rem;background:transparent;color:var(--muted2);border:1px solid var(--border);cursor:none;font-family:var(--font-b);font-size:.85rem;transition:all .2s}
.btn-sec:hover{border-color:rgba(255,255,255,.14);color:var(--text)}

/* card select */
.cgrid{display:grid;gap:.65rem}
.cg2{grid-template-columns:1fr 1fr}
.cg1{grid-template-columns:1fr}
.sc{border:1px solid var(--border);padding:1.1rem 1.1rem;cursor:none;transition:all .2s;background:rgba(255,255,255,.015);position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--violet),var(--amber));transform:scaleX(0);transform-origin:left;transition:transform .3s}
.sc:hover{border-color:rgba(255,255,255,.12);background:rgba(255,255,255,.03)}
.sc:hover::before{transform:scaleX(.5)}
.sc.sel{border-color:var(--vborder);background:var(--vdim)}
.sc.sel::before{transform:scaleX(1)}
.sc-chk{position:absolute;top:.65rem;right:.65rem;width:16px;height:16px;background:var(--violet);clip-path:polygon(0 0,calc(100% - 3px) 0,100% 3px,100% 100%,3px 100%,0 calc(100% - 3px));display:none;align-items:center;justify-content:center}
.sc.sel .sc-chk{display:flex}
.sc-em{font-size:1.6rem;display:block;margin-bottom:.6rem;animation:floaty 3.5s ease-in-out infinite}
.sc:nth-child(2) .sc-em{animation-delay:.5s}
.sc:nth-child(3) .sc-em{animation-delay:1s}
.sc:nth-child(4) .sc-em{animation-delay:1.5s}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.sc-title{font-family:var(--font-d);font-size:1rem;letter-spacing:.02em;margin-bottom:.25rem;font-weight:600}
.sc-desc{font-size:.8rem;color:var(--muted2);line-height:1.55;font-weight:300}

/* type row */
.tr{border:1px solid var(--border);padding:.85rem 1rem;cursor:none;transition:all .2s;background:rgba(255,255,255,.015);display:flex;align-items:center;gap:.75rem}
.tr:hover{border-color:rgba(255,255,255,.12);background:rgba(255,255,255,.03)}
.tr.sel{border-color:var(--vborder);background:var(--vdim)}
.tr-dot{width:9px;height:9px;flex-shrink:0;border:1px solid var(--border);border-radius:50%;transition:all .2s}
.tr.sel .tr-dot{background:var(--violet);border-color:var(--violet);box-shadow:0 0 7px rgba(124,58,237,.5)}
.tr-n{font-size:.83rem;font-weight:500}
.tr-d{font-size:.7rem;color:var(--muted);font-family:var(--font-m);margin-top:.1rem}

/* colors */
.crow{display:flex;gap:.55rem;flex-wrap:wrap;margin-top:.45rem}
.csw{width:30px;height:30px;cursor:none;clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px));border:2px solid transparent;transition:all .2s}
.csw.act{border-color:#fff;transform:scale(1.15)}
.csw:hover:not(.act){transform:scale(1.08)}
.cpick{width:30px;height:30px;border:1px dashed var(--border);display:flex;align-items:center;justify-content:center;cursor:none;clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px));font-size:.65rem;color:var(--muted);transition:all .2s;position:relative}
.cpick:hover{border-color:rgba(255,255,255,.2)}
.cpick input[type=color]{position:absolute;inset:0;opacity:0;cursor:none;width:100%;height:100%}

/* position toggle */
.ptrow{display:flex;gap:.65rem;margin-top:.45rem}
.pto{flex:1;border:1px solid var(--border);padding:.65rem;text-align:center;cursor:none;transition:all .2s;font-size:.75rem;color:var(--muted)}
.pto:hover{border-color:rgba(255,255,255,.14);color:var(--muted2)}
.pto.sel{border-color:var(--aborder);color:var(--amber);background:var(--adim)}
.pto-icon{font-size:1.1rem;display:block;margin-bottom:.25rem}

/* preview strip */
.prev{background:rgba(7,7,26,.7);border:1px solid var(--border);padding:.9rem 1.1rem;margin-bottom:1.4rem;display:flex;align-items:center;gap:.9rem}
.prev-lbl{font-family:var(--font-m);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);flex-shrink:0}
.prev-w{display:flex;align-items:center;gap:.6rem;flex:1}
.pl{width:36px;height:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));transition:background .3s}
.pn{font-family:var(--font-d);font-size:.9rem;letter-spacing:.06em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pst{font-size:.58rem;color:var(--green);display:flex;align-items:center;gap:.25rem;margin-top:1px}
.psd{width:4px;height:4px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* otp */
.otp-row{display:flex;gap:.55rem;justify-content:center;margin:1.4rem 0}
.otp-i{width:50px;height:58px;text-align:center;background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--text);font-family:var(--font-d);font-size:1.7rem;letter-spacing:.04em;outline:none;transition:all .2s}
.otp-i:focus{border-color:var(--vborder);background:var(--vdim);box-shadow:0 0 0 3px rgba(124,58,237,.08)}
.otp-i.filled{border-color:rgba(124,58,237,.3);color:var(--violet2)}

/* embed */
.etabs{display:flex;gap:.35rem;margin-bottom:.65rem}
.etab{font-family:var(--font-m);font-size:.63rem;letter-spacing:.08em;text-transform:uppercase;padding:.32rem .75rem;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:none;transition:all .2s}
.etab.act{background:var(--vdim);border-color:var(--vborder);color:var(--violet2)}
.codebox{background:#02020e;border:1px solid rgba(255,255,255,.06);padding:1rem 1.1rem;font-family:var(--font-m);font-size:.73rem;color:#47c8ff;line-height:1.75;position:relative;overflow-x:auto;margin-bottom:.7rem}
.codebox .kw{color:var(--amber)}
.codebox .at{color:#a78bfa}
.codebox .sv{color:#34d399}
.cpbtn{position:absolute;top:.55rem;right:.55rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);color:var(--muted2);font-size:.62rem;padding:.26rem .6rem;cursor:none;font-family:var(--font-b);transition:all .2s;display:flex;align-items:center;gap:.28rem}
.cpbtn:hover{background:var(--vdim);color:var(--violet2);border-color:var(--vborder)}
.cpbtn.ok{color:var(--green);border-color:rgba(16,185,129,.2)}

/* key box */
.kbox{background:#02020e;border:1px solid rgba(255,255,255,.06);padding:.8rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:.7rem;margin-top:.4rem}
.kval{font-family:var(--font-m);font-size:.8rem;color:var(--amber);letter-spacing:.05em;word-break:break-all}
.kcopy{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:.63rem;padding:.28rem .6rem;cursor:none;font-family:var(--font-b);transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:.28rem;flex-shrink:0}
.kcopy:hover{color:var(--amber);border-color:var(--aborder)}

/* success */
.sico{width:60px;height:60px;margin-bottom:1.4rem;background:linear-gradient(135deg,var(--violet),var(--amber));clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;animation:popIn .5s cubic-bezier(.16,1,.3,1) both}
@keyframes popIn{from{transform:scale(0) rotate(-15deg)}to{transform:scale(1) rotate(0)}}

/* next steps */
.nsl{display:flex;flex-direction:column;gap:.55rem;margin-top:1.1rem}
.nsi{display:flex;align-items:center;gap:.75rem;padding:.8rem .95rem;border:1px solid var(--border);background:rgba(255,255,255,.015);cursor:none;transition:all .2s;text-decoration:none;color:var(--text)}
.nsi:hover{border-color:var(--vborder);background:var(--vdim)}
.nsi-ico{width:30px;height:30px;flex-shrink:0;background:var(--vdim);border:1px solid var(--vborder);display:flex;align-items:center;justify-content:center;color:var(--violet2);clip-path:polygon(0 0,calc(100% - 5px) 0,100% 5px,100% 100%,5px 100%,0 calc(100% - 5px))}
.nsi-t{font-size:.82rem;font-weight:500}
.nsi-s{font-size:.68rem;color:var(--muted);font-family:var(--font-m);margin-top:.1rem}

/* notice box */
.notice{background:rgba(245,158,11,.05);border:1px solid rgba(245,158,11,.1);padding:.9rem 1rem;margin-bottom:1.3rem}
.notice-t{font-size:.7rem;color:var(--amber);font-weight:600;letter-spacing:.05em;margin-bottom:.25rem;display:flex;align-items:center;gap:.4rem}
.notice-b{font-size:.84rem;color:var(--muted2);line-height:1.65;font-weight:300}

/* loading spinner */
.ld{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:.4rem;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* toast */
#toaster{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;display:flex;flex-direction:column;gap:.45rem;pointer-events:none}
.toast{background:var(--mid);border:1px solid var(--border);padding:.62rem .95rem;display:flex;align-items:center;gap:.55rem;font-size:.77rem;animation:tIn .25s ease both;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px))}
@keyframes tIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:none}}
.toast.out{animation:tOut .25s ease forwards}
@keyframes tOut{to{opacity:0;transform:translateX(10px)}}
.td{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* status bar */
.status-bar{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.15);padding:.55rem .9rem;margin-bottom:1rem;font-size:.72rem;color:var(--green);font-family:var(--font-m);display:flex;align-items:center;gap:.5rem}
.status-bar.err{background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.15);color:var(--red)}
.status-bar.warn{background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.15);color:var(--amber)}

/* ── LOGO SWITCHING ── */
.vm-logo-light{display:none}
[data-theme="light"] .vm-logo-dark{display:none}
[data-theme="light"] .vm-logo-light{display:block}

/* ── THEME TOGGLE ── */
.theme-toggle-vm{
  width:32px;height:32px;background:transparent;
  border:1px solid var(--border);color:var(--muted2);
  display:flex;align-items:center;justify-content:center;cursor:none;
  transition:border-color .2s,color .2s;
  clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px));
  flex-shrink:0;
}
.theme-toggle-vm:hover{border-color:var(--amber);color:var(--amber)}
.theme-toggle-vm .icon-sun{display:block}
.theme-toggle-vm .icon-moon{display:none}
[data-theme="light"] .theme-toggle-vm .icon-sun{display:none}
[data-theme="light"] .theme-toggle-vm .icon-moon{display:block}

/* ── MOBILE HEADER ── */
.mob-header{
  display:none;
  position:fixed;top:0;left:0;right:0;z-index:80;
  align-items:center;justify-content:space-between;
  padding:.85rem 1.4rem;
  background:rgba(4,4,13,.88);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border2);
}
.mob-header img{height:32px;width:auto}

/* rail toggle placement */
.rail-toggle-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:1.5rem;
}

/* ── LIGHT THEME ── */
[data-theme="light"]{
  --void:#f4f2f5;
  --deep:#ffffff;
  --mid:#eeeeff;
  --surface:#f5f4ff;
  --text:#0d0d1f;

// Supabase REST helper — uses the user's access token for RLS
function sbRest(method, table, body, opts) {
  opts = opts || {};
  var headers = {
    'apikey': SUPABASE_ANON,
    'Authorization': 'Bearer ' + (S.accessToken || SUPABASE_ANON),
    'Content-Type': 'application/json',
    'Prefer': opts.prefer || 'return=representation'
  };
  var url = SUPABASE_URL + '/rest/v1/' + table;
  if (opts.query) url += '?' + opts.query;
  return fetch(url, {
    method: method,
    headers: headers,
    body: body ? JSON.stringify(body) : undefined,
  }).then(function(r) {
    if (!r.ok) return r.text().then(function(t){ throw new Error(t) });
    return r.json();
  });
}

function setLoading(btn, loading, text) {
  if (!btn) return;
  btn.disabled = loading;
  if (loading) {
    btn.innerHTML = '<span><span class="ld"></span> ' + (text || 'Working...') + '</span>';
  }
}
function resetBtn(btn, text) {
  if (!btn) return;
  btn.disabled = false;
  btn.innerHTML = '<span>' + text + '</span>';
}

function goTo(n){S.step=n;render();window.scrollTo(0,0)}

// ── STEP 1: Create Supabase Auth Account ──
function s1(){
  var e=document.getElementById('e1').value.trim();
  var p=document.getElementById('p1').value;
  if(!e||!e.includes('@')){toast('Please enter a valid email address','error');return}
  if(p.length<8){toast('Password must be at least 8 characters','error');return}

  S.email=e;S.password=p;
  var btn=document.getElementById('btn-s1');
  setLoading(btn,true,'Creating account...');

  // The redirect URL after email confirmation — points to THIS onboarding page
  var redirectUrl = window.location.origin + window.location.pathname;

  sb.auth.signUp({
    email: e,
    password: p,
    options: {
      emailRedirectTo: redirectUrl
    }
  })
    .then(function(result){
      if(result.error){
        // Check if user already exists
        if(result.error.message && result.error.message.toLowerCase().indexOf('already registered')!==-1){
          toast('This email is already registered. Redirecting to login...','error');
          setTimeout(function(){ window.location.href=LOGIN_URL; },2000);
          return;
        }
        throw result.error;
      }

      var user = result.data.user;
      if(user){
        S.userId = user.id;
        // If auto-confirm is on (unlikely in production), session is available immediately
        if(result.data.session){
          S.accessToken = result.data.session.access_token;
          try {
            var payload = JSON.parse(atob(result.data.session.access_token.split('.')[1]));
            S.tenantId = payload.tenant_id || '';
          } catch(ex){}
          toast('Account created and verified!','success');
          goTo(3); // Skip verification
          return;
        }
        toast('Account created! Check your email for the confirmation link.','success');
        goTo(2);
      }
    })
    .catch(function(err){
      toast(err.message||'Signup failed. Please try again.','error');
      resetBtn(btn,'CREATE ACCOUNT \u2192');
    });
}

// ── STEP 2: Link-based email verification ──
// Supabase sends a confirmation link. When clicked, it redirects here with tokens in the URL hash.
// We also poll for session in case the user clicks the link in another tab.

var verifyPollTimer = null;

function startVerifyPoll(){
  // Clear any existing poll
  if(verifyPollTimer) clearInterval(verifyPollTimer);

  // Poll every 3 seconds to check if a session appeared
  verifyPollTimer = setInterval(function(){
    sb.auth.getSession().then(function(result){
      if(result.data.session){
        clearInterval(verifyPollTimer);
        verifyPollTimer = null;
        handleVerifiedSession(result.data.session);
      }
    });
  }, 3000);
}

function handleVerifiedSession(session){
  S.accessToken = session.access_token;
  S.userId = session.user.id;
  S.email = session.user.email || S.email;
  try {
    var payload = JSON.parse(atob(session.access_token.split('.')[1]));
    S.tenantId = payload.tenant_id || '';
  } catch(ex){}

  var statusEl = document.getElementById('verify-status');
  if(statusEl) statusEl.textContent = 'Email verified! Continuing\u2026';

  toast('Email verified!','success');
  setTimeout(function(){ goTo(3); }, 600);
}

function resendConfirmation(){
  sb.auth.resend({ type:'signup', email: S.email })
    .then(function(result){
      if(result.error) throw result.error;
      toast('Confirmation email resent! Check your inbox.','success');
    })
    .catch(function(err){
      toast(err.message||'Could not resend. Please try again.','error');
    });
}

// ── STEP 3: Save profile details + plan ──
function s3(){
  var fn=document.getElementById('fn').value.trim();
  if(!fn){toast('Please enter your first name','error');return}
  S.firstName=fn;
  S.lastName=document.getElementById('ln').value.trim();
  S.company=document.getElementById('co').value.trim();
  var ws=document.getElementById('ws').value.trim();

  // Website is mandatory — the bot needs it for context
  if(!ws){toast('Please enter your website URL \u2014 the bot needs it to learn about your business','error');return}

  // Auto-add https:// if user typed a domain without protocol
  if(ws.indexOf('http')!==0) ws='https://'+ws;

  // Basic URL validation
  if(ws.indexOf('.')===-1){toast('Please enter a valid website URL (e.g. mycompany.ae)','error');return}

  S.website=ws;

  var btn=document.getElementById('btn-s3');
  setLoading(btn,true,'Saving...');

  var promises = [];

  // Update auth user metadata (this always works — no RLS needed)
  promises.push(
    sb.auth.updateUser({
      data: {
        first_name: S.firstName,
        last_name: S.lastName,
        company: S.company,
        plan: S.plan,
      }
    })
  );

  // Update tenant name (if we have tenant_id)
  if(S.tenantId){
    var tenantUpdate = { name: S.company || (S.firstName + '\'s Workspace') };
    promises.push(
      sbRest('PATCH', 'tenants', tenantUpdate, { query: 'id=eq.'+S.tenantId })
        .catch(function(err){ console.warn('Tenant update skipped:', err.message); })
    );
  }

  Promise.all(promises)
    .then(function(){
      toast('Details saved!','success');
      goTo(4);
    })
    .catch(function(err){
      console.warn('Profile update:', err.message);
      toast('Details saved!','success');
      goTo(4);
    });
}

// ── STEP 4: Save bot name + type (locally, created in step 5) ──
function s4(){
  var bn=document.getElementById('bn').value.trim();
  if(!bn){toast('Please give your bot a name','error');return}
  S.botName=bn;
  goTo(5);
}

// ── Ensure profile + tenant exist (calls SECURITY DEFINER function) ──
function ensureProfile(){
  return new Promise(function(resolve, reject){
    // Call the database function that creates tenant+profile if missing
    // This bypasses RLS via SECURITY DEFINER
    fetch(SUPABASE_URL + '/rest/v1/rpc/ensure_user_profile', {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_ANON,
        'Authorization': 'Bearer ' + S.accessToken,
        'Content-Type': 'application/json',
      },
      body: '{}',
    })
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data && data.tenant_id){
        S.tenantId = data.tenant_id;
        if(data.status === 'created'){
          toast('Account setup complete!','success');
        }
        resolve();
      } else if(data && data.error){
        throw new Error(data.error);
      } else {
        // Fallback — use tenantId from JWT if available
        if(S.tenantId) resolve();
        else throw new Error('Could not set up account. Please try again.');
      }
    })
    .catch(function(err){
      console.warn('ensureProfile error:', err.message);
      if(S.tenantId) resolve();
      else reject(err);
    });
  });
}

// ── STEP 5: Create bot + widget key in Supabase ──
function s5(){
  var wm=document.getElementById('wm').value.trim();
  S.welcomeMsg=wm||('Hi! I\'m '+S.botName+' \u2014 how can I help you today?');

  var btn=document.getElementById('btn-s5');
  setLoading(btn,true,'Setting up your account...');

  // Ensure profile + tenant exist first (critical for OAuth users)
  ensureProfile()
    .then(function(){
      setLoading(btn,true,'Creating your bot...');

      // Build bot object matching the bots table schema
      var botData = {
        tenant_id: S.tenantId,
        name: S.botName,
        persona: S.botType,
        model: 'gpt-4o',
        temperature: 0.7,
        welcome_message: S.welcomeMsg,
        is_active: true,
        settings: {
          personality: S.botPersonality,
          website_url: S.website || '',
          color: S.botColor,
          position: S.botPosition,
        }
      };

      return sbRest('POST', 'bots', botData);
    })
    .then(function(rows){
      if(!rows||!rows.length) throw new Error('Bot creation returned no data');
      var bot = rows[0];
      S.botId = bot.id;
      toast('Bot "'+S.botName+'" created!','success');

      // Now create widget key for this bot — include tenant_id for RLS
      return sbRest('POST', 'widget_keys', {
        bot_id: S.botId,
        tenant_id: S.tenantId,
        is_active: true,
      });
    })
    .then(function(rows){
      if(!rows||!rows.length) throw new Error('Widget key creation returned no data');
      var wk = rows[0];
      S.widgetKey = wk.key || wk.id;
      toast('Widget key generated!','success');
      goTo(6);
    })
    .catch(function(err){
      console.error('Bot/key creation error:', err);
      toast('Error: '+(err.message||'Could not create bot. Please try again.'),'error');
      resetBtn(btn,'SAVE & CREATE BOT \u2192');
    });
}

function toast(msg,type){
  var cols={success:'#10b981',error:'#ef4444',info:'#7c3aed',warn:'#f59e0b'};
  var t=document.createElement('div');t.className='toast';
  t.innerHTML='<div class="td" style="background:'+(cols[type]||cols.info)+'"></div><span>'+msg+'</span>';
  document.getElementById('toaster').appendChild(t);
  setTimeout(function(){t.classList.add('out');setTimeout(function(){t.remove()},300)},3200);
}

// ═══════════════════════════════════════════════════════════════════════
// INIT — Handle email confirmation redirect & existing sessions
// ═══════════════════════════════════════════════════════════════════════
(function init(){
  // ── 1. Check for Supabase hash fragment (from email confirmation link) ──
  // When user clicks the confirmation email, Supabase redirects to:
  //   https://yoursite.com/onboarding.html#access_token=...&type=signup
  // Supabase JS client auto-detects this hash and creates a session.

  var hash = window.location.hash;
  var hasTokenInHash = hash && hash.indexOf('access_token=') !== -1;

  // Check URL params (for Google OAuth redirect)
  var params = new URLSearchParams(window.location.search);
  var stepParam = parseInt(params.get('step'));

  // ── 2. Listen for auth state changes (this catches the hash-based session) ──
  sb.auth.onAuthStateChange(function(event, session){
    if((event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') && session){
      S.accessToken = session.access_token;
      S.userId = session.user.id;
      S.email = session.user.email || S.email;
      // Extract name from Google OAuth metadata if available
      var meta = session.user.user_metadata || {};
      if(meta.full_name && !S.firstName){
        var parts = meta.full_name.split(' ');
        S.firstName = parts[0] || '';
        S.lastName = parts.slice(1).join(' ') || '';
      }
      try {
        var payload = JSON.parse(atob(session.access_token.split('.')[1]));
        S.tenantId = payload.tenant_id || '';
      } catch(ex){}

      // If we arrived here from email confirmation link
      if(hasTokenInHash && S.step <= 2){
        // Clean up the URL hash so it doesn't look messy
        if(window.history.replaceState){
          window.history.replaceState(null, '', window.location.pathname + window.location.search);
        }
        toast('Email verified successfully!','success');
        S.step = 3;
        render();
        return;
      }
    }
  });

  // ── 3. Check for existing session (returning user or already logged in) ──
  sb.auth.getSession().then(function(result){
    var session = result.data.session;
    if(session){
      S.accessToken = session.access_token;
      S.userId = session.user.id;
      S.email = session.user.email || '';
      try {
        var payload = JSON.parse(atob(session.access_token.split('.')[1]));
        S.tenantId = payload.tenant_id || '';
      } catch(ex){}

      // If coming from email confirmation hash, we'll handle it in onAuthStateChange
      if(hasTokenInHash){
        // onAuthStateChange will fire — just render the loading state for now
        S.step = 2;
        render();
        return;
      }

      // If returning from OAuth, jump to requested step
      if(stepParam && stepParam >= 3){
        S.step = stepParam;
        render();
        return;
      }

      // Check if they already completed onboarding (have bots)
      sbRest('GET', 'bots', null, { query: 'tenant_id=eq.'+S.tenantId+'&limit=1' })
        .then(function(bots){
          if(bots && bots.length > 0){
            // Already onboarded — redirect to dashboard
            window.location.href = DASHBOARD_URL;
          } else {
            // Has account but no bot yet — continue from step 3
            S.step = 3;
            render();
          }
        })
        .catch(function(){
          S.step = 3;
          render();
        });
      return;
    }

    // ── 4. No session — start from step 1 ──
    render();
  });
})();

// ── THEME TOGGLE ──
function toggleTheme(){
  var isLight=document.documentElement.getAttribute('data-theme')==='light';
  document.documentElement.setAttribute('data-theme',isLight?'':'light');
  localStorage.setItem('vm-theme',isLight?'dark':'light');
}
(function(){
  if(localStorage.getItem('vm-theme')==='light')
    document.documentElement.setAttribute('data-theme','light');
})();
</script>
